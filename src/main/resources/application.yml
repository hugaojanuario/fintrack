spring:
  application:
    name: fintrack

  datasource:
    url: jdbc:postgresql://localhost:5432/fintrack
    username: fintrack
    password: fintrack
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: fintrack-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

api:
  security:
    token:
      secret: ${JWT_SECRET:dev-secret-change-in-production}

brapi:
  token: ${BRAPI_TOKEN:}
  tickers: ${BRAPI_TICKERS:PETR4,VALE3,ITUB4,BBDC4,ABEV3,WEGE3,RENT3}

aws:
  region: ${AWS_REGION:us-east-1}
  s3:
    bucket: ${AWS_S3_BUCKET:fintrack-reports}
  ses:
    from-email: ${AWS_SES_FROM_EMAIL:noreply@fintrack.com}
